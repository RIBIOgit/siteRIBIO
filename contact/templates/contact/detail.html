{% extends "base.html" %}

{% block content %}

<div class="card mx-auto" style="max-width: 200px;">

    {% if item.image %}
        <img src="{{ item.image.url }}"
            class="card-img-top"
            style="height:200px; object-fit:cover;">
    {% endif %}

    <div class="card-body">

        <h1>{{ item.title }}</h1>

        <p>{{ item.contact }}</p>

        <small class="text-muted">
            {{ item.created_at }}
        </small>

    </div>

</div>

{% endblock %}
