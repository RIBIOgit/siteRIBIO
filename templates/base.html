<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Portal RIBIO - Rede Integrada de Biossegurança</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f6fa;
        }

        .navbar{
            margin-bottom:40px;
        }

        .container{
            max-width:1100px;
        }

        .navbar-brand{
            font-weight:700;
        }

        .card{
            border:1px solid rgba(0,0,0,.15);
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.04);
            transition:.2s;
        }

        .card:hover{
            border-color:rgba(0,0,0,.25);
            box-shadow:0 8px 18px rgba(0,0,0,.10);
            transform:translateY(-2px);
        }

        a{
            text-decoration:none;
        }

        a:hover{
            text-decoration:none;
        }

        /* Espaço antes do rodapé */
        .page-content{
            min-height:70vh;
        }

        /* Rodapé */

        footer{

            background:#2f3640;

            color:white;

            margin-top:80px;

            padding:40px 0;

        }

        footer a{

            color:white;

            text-decoration:none;

        }

        footer a:hover{

            color:#8dd9ff;

        }

        .social-icon{

            font-size:30px;

            margin-left:18px;

            transition:.2s;

        }

        .social-icon:hover{

            transform:translateY(-3px);

        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            RIBIO - Rede Integrada de Biossegurança
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="/">Home</a>

            <a class="nav-link" href="/news/">Notícias</a>

            <a class="nav-link" href="/content/">Conteúdo</a>

            <a class="nav-link" href="/contact/">Sobre nós</a>

        </div>

    </div>

</nav>

<div class="container page-content">

    {% block content %}
    {% endblock %}

</div>

<footer>

    <div class="container">

        <div class="row align-items-center">

            <div class="col-md-6">

                <h5 class="mb-3">
                    Portal RIBIO
                </h5>

                <p class="mb-1">
                    <i class="bi bi-envelope-fill"></i>
                    ribio.contato@gmail.ufrj.br
                </p>

                <p class="mb-0">
                    <i class="bi bi-telephone-fill"></i>
                    +55 (21) 99140-6669
                </p>

            </div>

            <div class="col-md-6 text-md-end mt-4 mt-md-0">

                <a href="https://www.instagram.com/ribio.ufrj?igsh=YjJ0aTBzcG5sOXR1&utm_source=qr" target="_blank">
                    <i class="bi bi-instagram social-icon"></i>
                </a>

                <a href="https://tiktok.com" target="_blank">
                    <i class="bi bi-tiktok social-icon"></i>
                </a>

                <a href="https://github.com/RIBIOgit/siteRIBIO" target="_blank">
                    <i class="bi bi-github social-icon"></i>
                </a>

            </div>

        </div>

        <hr class="border-secondary my-4">

        <div class="text-center">

            © 2026 Portal RIBIO · Rede Integrada de Biossegurança

        </div>

    </div>

</footer>

</body>

</html>
